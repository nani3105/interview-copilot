name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install build tools (for native modules)
        run: sudo apt-get install -y python3 make g++

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run ESLint
        working-directory: apps/desktop
        run: npx --prefix ../../ eslint src --ext .ts,.tsx --max-warnings 0

      - name: Run TypeScript check
        working-directory: apps/desktop
        run: npx --prefix ../../ tsc --noEmit

  test:
    name: Tests & Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install build tools (for native modules)
        run: sudo apt-get install -y python3 make g++

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run tests with coverage
        working-directory: apps/desktop
        run: npx --prefix ../../ vitest run --coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          directory: apps/desktop/coverage
          flags: desktop
          name: desktop-coverage
          fail_ci_if_error: false

      - name: Upload coverage report artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: apps/desktop/coverage/
          retention-days: 7

  build:
    name: Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install build tools (for native modules)
        run: sudo apt-get install -y python3 make g++

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build Vite renderer
        working-directory: apps/desktop
        run: npx --prefix ../../ vite build

      - name: TypeScript check (main process)
        working-directory: apps/desktop
        run: npx --prefix ../../ tsc -p tsconfig.main.json --noEmit
