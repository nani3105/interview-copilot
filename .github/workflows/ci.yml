name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  WORKING_DIR: apps/desktop
  # Skip Electron binary download (not needed for lint/test/build)
  ELECTRON_SKIP_BINARY_DOWNLOAD: 1
  # Skip better-sqlite3 native compilation in CI
  npm_config_build_from_source: false

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ${{ env.WORKING_DIR }}/package-lock.json

      - name: Install build tools
        run: sudo apt-get install -y python3 make g++
        working-directory: .

      - name: Install dependencies
        run: npm install --legacy-peer-deps
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: 1

      - name: Show crash log if install failed
        if: failure()
        run: find /home/runner/.npm/_logs -name "*.log" -exec tail -100 {} \;
        working-directory: .

      - name: Run ESLint
        run: npm run lint

      - name: Run TypeScript check
        run: npm run typecheck

  test:
    name: Tests & Coverage
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ${{ env.WORKING_DIR }}/package-lock.json

      - name: Install build tools
        run: sudo apt-get install -y python3 make g++
        working-directory: .

      - name: Install dependencies
        run: npm install --legacy-peer-deps
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: 1

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          directory: ${{ env.WORKING_DIR }}/coverage
          flags: desktop
          name: desktop-coverage
          fail_ci_if_error: false

      - name: Upload coverage report artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: ${{ env.WORKING_DIR }}/coverage/
          retention-days: 7

  build:
    name: Build Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ${{ env.WORKING_DIR }}/package-lock.json

      - name: Install build tools
        run: sudo apt-get install -y python3 make g++
        working-directory: .

      - name: Install dependencies
        run: npm install --legacy-peer-deps
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: 1

      - name: Build Vite renderer
        run: npm run build:vite

      - name: TypeScript check (main process)
        run: npx tsc -p tsconfig.main.json --noEmit
