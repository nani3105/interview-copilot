name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  WORKING_DIR: apps/desktop
  # Disable all postinstall/lifecycle scripts in CI
  # This prevents native module compilation (canvas, better-sqlite3, electron, etc.)
  # while STILL creating node_modules/.bin symlinks (bin linking ≠ lifecycle scripts)
  npm_config_ignore_scripts: 'true'

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ${{ env.WORKING_DIR }}/package-lock.json

      - name: Install dependencies
        id: install
        run: npm ci --legacy-peer-deps
        continue-on-error: true

      - name: Print npm crash log if install failed
        if: steps.install.outcome == 'failure'
        run: |
          echo "=== NPM CRASH LOG ==="
          find /home/runner/.npm/_logs -name "*.log" 2>/dev/null | head -1 | xargs tail -100 2>/dev/null || echo "No log found"
          echo "=== INSTALLED PACKAGES ==="
          ls node_modules 2>/dev/null | head -20 || echo "node_modules empty"
        working-directory: ${{ env.WORKING_DIR }}

      - name: Fail if install failed
        if: steps.install.outcome == 'failure'
        run: exit 1

      - name: Run ESLint
        run: npm run lint

      - name: Run TypeScript check
        run: npm run typecheck

  test:
    name: Tests & Coverage
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ${{ env.WORKING_DIR }}/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          directory: ${{ env.WORKING_DIR }}/coverage
          flags: desktop
          name: desktop-coverage
          fail_ci_if_error: false

      - name: Upload coverage report artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: ${{ env.WORKING_DIR }}/coverage/
          retention-days: 7

  build:
    name: Build Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ${{ env.WORKING_DIR }}/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build Vite renderer
        run: npm run build:vite

      - name: TypeScript check (main process)
        run: npx tsc -p tsconfig.main.json --noEmit
